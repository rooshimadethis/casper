name: Casper
options:
  bundleIdPrefix: com.rooshi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    version: "0.18.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    version: "0.13.6"
  LLM.swift:
    url: https://github.com/obra/LLM.swift.git
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"

targets:
  Casper:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - Casper
    settings:
      base:
        INFOPLIST_FILE: Casper/Info.plist
        CODE_SIGN_ENTITLEMENTS: Casper/Casper.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.rooshi.casper
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: BBVMGXR9AY
        ENABLE_HARDENED_RUNTIME: NO
    dependencies:
      - package: WhisperKit
      - package: FluidAudio
      - package: LLM.swift
        product: LLM
      - package: Sparkle
    entitlements:
      path: Casper/Casper.entitlements
      properties:
        com.apple.security.device.audio-input: true

  CasperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CasperTests
    dependencies:
      - target: Casper
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Casper.app/Contents/MacOS/Casper"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

  CleanupModelProbe:
    type: tool
    platform: macOS
    sources:
      - CleanupModelProbe
      - CleanupModelProbeSupport
    dependencies:
      - package: LLM.swift
        product: LLM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rooshi.casper.cleanup-model-probe
        GENERATE_INFOPLIST_FILE: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
